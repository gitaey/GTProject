name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 19922
          command_timeout: 30m
          script: |
            cd /gtp/GTProject
            git pull origin master

            cd /gtp/GTProject/backend
            JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto ./mvnw clean package -DskipTests
            /gtp/stop-backend.sh 2>/dev/null || true
            /gtp/start-backend.sh

            echo "백엔드 배포 완료"
