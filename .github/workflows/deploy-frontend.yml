name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 19922
          command_timeout: 30m
          script: |
            cd /gtp/GTProject
            git pull origin master

            cd /gtp/GTProject/frontend
            docker run --rm \
              -v $(pwd):/app \
              -w /app \
              node:18 \
              sh -c "npm install && npm run build"

            docker stop gtp-frontend 2>/dev/null || true
            docker rm gtp-frontend 2>/dev/null || true
            docker run -d \
              --name gtp-frontend \
              --restart always \
              -v /gtp/GTProject/frontend:/app \
              -w /app \
              -p 49092:3000 \
              -e NODE_ENV=production \
              node:18 \
              sh -c "npm start"

            echo "프론트엔드 배포 완료"
