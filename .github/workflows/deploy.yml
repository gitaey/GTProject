name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits), '"backend/')
    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 19922
          command_timeout: 30m
          script: |
            cd /gtp/GTProject
            git pull origin master

            cd /gtp/GTProject/backend
            JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto ./mvnw clean package -DskipTests
            /gtp/stop-backend.sh 2>/dev/null || true
            /gtp/start-backend.sh

            echo "백엔드 배포 완료"

  deploy-frontend:
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits), '"frontend/')
    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 19922
          command_timeout: 30m
          script: |
            cd /gtp/GTProject
            git pull origin master

            cd /gtp/GTProject/frontend
            docker run --rm \
              -v $(pwd):/app \
              -w /app \
              node:18 \
              sh -c "npm install && npm run build"

            docker stop gtp-frontend 2>/dev/null || true
            docker rm gtp-frontend 2>/dev/null || true
            docker run -d \
              --name gtp-frontend \
              --restart always \
              -v /gtp/GTProject/frontend:/app \
              -w /app \
              -p 49092:3000 \
              -e NODE_ENV=production \
              node:18 \
              sh -c "npm start"

            echo "프론트엔드 배포 완료"
