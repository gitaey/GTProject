spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:49091/gtpdb}
    username: ${DB_USERNAME:gtp}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    # Docker CI/CD 배포 테스트
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

jwt:
  secret: ${JWT_SECRET:gtp-secret-key-for-jwt-token-generation-2024-long-enough}
  expiration: 86400000  # 24시간

google:
  sheets:
    spreadsheet-id: 1_i5MeUeQkEXX3cwP1_JH-bSqkx-EoE7smbYTxegm0Vk
    credentials-path: classpath:google-credentials.json
    credentials-json: ${GOOGLE_CREDENTIALS_JSON:}
    sheet-name: 레이드일정
    character-sheet-name: 캐릭터

discord:
  bot:
    token: ${DISCORD_BOT_TOKEN:}

lostark:
  api:
    key: ${LOSTARK_API_KEY:}
